<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="560" viewBox="0 0 1120 560">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b4252" />
    </marker>
    <style>
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #2e3440; }
      .small { font-size: 13px; fill: #4c566a; }
      .axis { stroke: #868e96; stroke-width: 1; }
      .wave { stroke: #1971c2; stroke-width: 4; fill: none; }
      .early { stroke: #e67700; stroke-width: 2.2; }
      .late { stroke: #c92a2a; stroke-width: 2.2; }
      .ideal { stroke: #2b8a3e; stroke-width: 2.2; stroke-dasharray: 6 5; }
      .box { fill: #ffffff; stroke: #4c566a; stroke-width: 1.3; rx: 8; }
      .formula { font-size: 15px; fill: #2e3440; }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />
  <text class="text" x="40" y="40" font-size="22">Alexander bang-bang 相位检测器的早晚判断</text>
  <text class="small" x="40" y="66">示例为上升沿：previous_decision=-1, current_decision=+1</text>

  <line class="axis" x1="80" y1="170" x2="1040" y2="170" />
  <path class="wave" d="M90,230 C260,230 340,230 430,230 C500,230 515,110 590,110 C710,110 850,110 1030,110" />
  <line class="ideal" x1="515" y1="92" x2="515" y2="255" />
  <text class="small" x="485" y="278">真实边沿</text>

  <line class="early" x1="425" y1="88" x2="425" y2="255" />
  <line class="early" x1="275" y1="88" x2="275" y2="255" />
  <line class="early" x1="575" y1="88" x2="575" y2="255" />
  <text class="text" x="238" y="82">D[k-1]</text>
  <text class="text" x="407" y="82">E[k]</text>
  <text class="text" x="553" y="82">D[k]</text>
  <text class="small" x="350" y="292" fill="#e67700">本地时钟偏早：E[k] 落在边沿之前，edge_sample &lt; 0</text>

  <line class="late" x1="605" y1="315" x2="605" y2="480" />
  <line class="late" x1="455" y1="315" x2="455" y2="480" />
  <line class="late" x1="755" y1="315" x2="755" y2="480" />
  <line class="axis" x1="80" y1="395" x2="1040" y2="395" />
  <path class="wave" d="M90,455 C260,455 340,455 430,455 C500,455 515,335 590,335 C710,335 850,335 1030,335" />
  <line class="ideal" x1="515" y1="315" x2="515" y2="480" />
  <text class="text" x="418" y="310">D[k-1]</text>
  <text class="text" x="587" y="310">E[k]</text>
  <text class="text" x="733" y="310">D[k]</text>
  <text class="small" x="350" y="518" fill="#c92a2a">本地时钟偏晚：E[k] 落在边沿之后，edge_sample &gt; 0</text>

  <rect class="box" x="720" y="210" width="340" height="90" />
  <text class="formula" x="743" y="242">e = sign((D[k-1] - D[k]) · E[k])</text>
  <text class="small" x="743" y="268">e &gt; 0：采样时钟偏早，下一次向后推</text>
  <text class="small" x="743" y="288">e &lt; 0：采样时钟偏晚，下一次向前拉</text>
</svg>
