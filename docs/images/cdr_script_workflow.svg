<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="520" viewBox="0 0 1100 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b4252" />
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #4c566a; stroke-width: 1.5; rx: 8; }
      .main { fill: #e7f5ff; stroke: #1971c2; }
      .cdr { fill: #ebfbee; stroke: #2b8a3e; }
      .fixed { fill: #fff5f5; stroke: #c92a2a; }
      .out { fill: #fff9db; stroke: #e67700; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #2e3440; }
      .small { font-size: 13px; fill: #4c566a; }
      .arrow { stroke: #3b4252; stroke-width: 1.6; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />
  <text class="text" x="40" y="40" font-size="22">cdr_demo.py 总体工作流程</text>

  <rect class="box main" x="55" y="85" width="180" height="72" />
  <text class="text" x="91" y="115">命令行入口</text>
  <text class="text small" x="88" y="139">python3 cdr_demo.py</text>

  <rect class="box main" x="290" y="85" width="180" height="72" />
  <text class="text" x="334" y="115">parse_args()</text>
  <text class="text small" x="326" y="139">读取 bits/sps/ppm/noise</text>

  <rect class="box main" x="525" y="85" width="180" height="72" />
  <text class="text" x="580" y="115">Config</text>
  <text class="text small" x="558" y="139">冻结参数对象</text>

  <rect class="box" x="760" y="85" width="240" height="72" />
  <text class="text" x="792" y="115">generate_nrz_signal()</text>
  <text class="text small" x="793" y="139">bits, levels, boundaries, samples</text>

  <line class="arrow" x1="235" y1="121" x2="289" y2="121" />
  <line class="arrow" x1="470" y1="121" x2="524" y2="121" />
  <line class="arrow" x1="705" y1="121" x2="759" y2="121" />

  <rect class="box fixed" x="185" y="235" width="250" height="82" />
  <text class="text" x="228" y="267">run_fixed_sampler()</text>
  <text class="text small" x="225" y="291">固定周期采样，不反馈修正</text>

  <rect class="box cdr" x="665" y="235" width="250" height="82" />
  <text class="text" x="731" y="267">run_cdr()</text>
  <text class="text small" x="696" y="291">相位检测 + 环路更新</text>

  <line class="arrow" x1="850" y1="157" x2="335" y2="234" />
  <line class="arrow" x1="880" y1="157" x2="790" y2="234" />

  <rect class="box out" x="125" y="390" width="220" height="72" />
  <text class="text" x="181" y="420">write_csv()</text>
  <text class="text small" x="160" y="444">输出每个 bit 的采样数据</text>

  <rect class="box out" x="440" y="390" width="220" height="72" />
  <text class="text" x="496" y="420">write_svg()</text>
  <text class="text small" x="470" y="444">输出相位误差曲线图</text>

  <rect class="box out" x="755" y="390" width="220" height="72" />
  <text class="text" x="804" y="420">summarize()</text>
  <text class="text small" x="795" y="444">打印 BER 和相位误差</text>

  <line class="arrow" x1="310" y1="317" x2="235" y2="389" />
  <line class="arrow" x1="790" y1="317" x2="235" y2="389" />
  <line class="arrow" x1="310" y1="317" x2="550" y2="389" />
  <line class="arrow" x1="790" y1="317" x2="550" y2="389" />
  <line class="arrow" x1="310" y1="317" x2="865" y2="389" />
  <line class="arrow" x1="790" y1="317" x2="865" y2="389" />
</svg>
