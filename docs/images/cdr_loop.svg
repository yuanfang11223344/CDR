<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="500" viewBox="0 0 1120 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#3b4252" />
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #4c566a; stroke-width: 1.5; rx: 8; }
      .source { fill: #f1f3f5; }
      .sampler { fill: #e7f5ff; stroke: #1971c2; }
      .pd { fill: #fff9db; stroke: #e67700; }
      .loop { fill: #ebfbee; stroke: #2b8a3e; }
      .text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 17px; fill: #2e3440; }
      .small { font-size: 13px; fill: #4c566a; }
      .formula { font-size: 14px; fill: #2e3440; }
      .arrow { stroke: #3b4252; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
      .fb { stroke: #2b8a3e; stroke-width: 1.8; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="100%" height="100%" fill="#ffffff" />
  <text class="text" x="40" y="38" font-size="22">数字 CDR 环路：用数据边沿修正采样时钟</text>

  <rect class="box source" x="50" y="125" width="175" height="90" />
  <text class="text" x="88" y="160">接收波形</text>
  <text class="text small" x="79" y="185">ADC samples</text>

  <rect class="box sampler" x="300" y="125" width="190" height="90" />
  <text class="text" x="338" y="154">插值采样器</text>
  <text class="text small" x="331" y="180">y(t_k) → 判决 D_k</text>
  <text class="text small" x="332" y="200">t_k 可为小数采样点</text>

  <rect class="box pd" x="565" y="125" width="210" height="90" />
  <text class="text" x="600" y="154">Alexander PD</text>
  <text class="text small" x="591" y="180">只在数据翻转时输出</text>
  <text class="text small" x="593" y="200">e_k ∈ {-1, 0, +1}</text>

  <rect class="box loop" x="850" y="125" width="210" height="90" />
  <text class="text" x="894" y="154">环路滤波器</text>
  <text class="text small" x="882" y="180">相位增益 Kp</text>
  <text class="text small" x="882" y="200">频率增益 Kf</text>

  <rect class="box loop" x="465" y="315" width="230" height="95" />
  <text class="text" x="524" y="346">NCO/时钟</text>
  <text class="text formula" x="492" y="372">P ← clip(P + Kf e)</text>
  <text class="text formula" x="492" y="394">t ← t + P + Kp e</text>

  <line class="arrow" x1="225" y1="170" x2="299" y2="170" />
  <line class="arrow" x1="490" y1="170" x2="564" y2="170" />
  <line class="arrow" x1="775" y1="170" x2="849" y2="170" />
  <path class="arrow" d="M955,215 C955,285 800,360 696,360" />
  <path class="fb" d="M465,360 C290,360 250,238 330,205" />

  <text class="text small" x="287" y="335">反馈新的采样相位 t_k</text>
  <text class="text small" x="800" y="280">误差驱动相位和频率更新</text>
</svg>
