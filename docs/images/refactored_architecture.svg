<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="620" viewBox="0 0 1180 620">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#343a40" />
    </marker>
    <style>
      .title { font: 700 24px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #212529; }
      .text { font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #212529; }
      .small { font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #495057; }
      .box { fill: #ffffff; stroke: #495057; stroke-width: 1.5; rx: 8; }
      .cli { fill: #e7f5ff; stroke: #1971c2; }
      .cfg { fill: #fff9db; stroke: #e67700; }
      .sig { fill: #f3f0ff; stroke: #7048e8; }
      .cdr { fill: #ebfbee; stroke: #2b8a3e; }
      .plot { fill: #fff5f5; stroke: #c92a2a; }
      .out { fill: #f8f9fa; stroke: #868e96; }
      .arrow { stroke: #343a40; stroke-width: 1.7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect width="100%" height="100%" fill="#ffffff" />
  <text class="title" x="42" y="44">CDR 重构后工程架构</text>

  <rect class="box cli" x="55" y="90" width="225" height="95" />
  <text class="text" x="92" y="124">cdr_demo.py</text>
  <text class="small" x="82" y="150">兼容入口，调用 cdr.cli</text>
  <text class="small" x="82" y="170">python3 cdr_demo.py</text>

  <rect class="box cli" x="370" y="90" width="225" height="95" />
  <text class="text" x="429" y="124">cdr/cli.py</text>
  <text class="small" x="398" y="150">解析参数、编排流程</text>
  <text class="small" x="398" y="170">写 CSV/JSON/图像</text>

  <rect class="box cfg" x="685" y="90" width="225" height="95" />
  <text class="text" x="735" y="124">cdr/config.py</text>
  <text class="small" x="715" y="150">SimulationConfig</text>
  <text class="small" x="715" y="170">CDRLoopConfig</text>

  <rect class="box sig" x="105" y="275" width="250" height="115" />
  <text class="text" x="180" y="309">cdr/signal.py</text>
  <text class="small" x="138" y="335">NumPy 生成 bit/边界/噪声</text>
  <text class="small" x="138" y="355">SciPy lfilter 模拟信道</text>
  <text class="small" x="138" y="375">输出 NRZSignal</text>

  <rect class="box cdr" x="465" y="275" width="250" height="115" />
  <text class="text" x="525" y="309">cdr/recovery.py</text>
  <text class="small" x="493" y="335">固定采样对照组</text>
  <text class="small" x="493" y="355">Alexander bang-bang CDR</text>
  <text class="small" x="493" y="375">Pandas 汇总指标</text>

  <rect class="box plot" x="825" y="275" width="250" height="115" />
  <text class="text" x="886" y="309">cdr/plots.py</text>
  <text class="small" x="854" y="335">Matplotlib 相位误差图</text>
  <text class="small" x="854" y="355">诊断面板与眼图视图</text>
  <text class="small" x="854" y="375">无 GUI 后端输出文件</text>

  <rect class="box out" x="230" y="485" width="720" height="75" />
  <text class="text" x="470" y="518">outputs/</text>
  <text class="small" x="270" y="543">cdr_demo_output.csv · cdr_demo_summary.json · cdr_demo_phase.svg · cdr_demo_diagnostics.png</text>

  <line class="arrow" x1="280" y1="138" x2="369" y2="138" />
  <line class="arrow" x1="595" y1="138" x2="684" y2="138" />
  <path class="arrow" d="M482,185 C390,230 295,245 235,274" />
  <path class="arrow" d="M798,185 C740,235 665,248 605,274" />
  <line class="arrow" x1="355" y1="333" x2="464" y2="333" />
  <line class="arrow" x1="715" y1="333" x2="824" y2="333" />
  <path class="arrow" d="M590,390 C590,435 590,455 590,484" />
  <path class="arrow" d="M950,390 C950,440 860,462 780,484" />
</svg>
